name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      PORT: 3001
      LAB_MODE: "false"
      DATABASE_URL: postgresql://tenantguard:tenantguard_ci_password@127.0.0.1:5432/tenantguard_test?schema=public

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: tenantguard
          POSTGRES_PASSWORD: tenantguard_ci_password
          POSTGRES_DB: tenantguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenantguard -d tenantguard_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply test migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build --no-cache --tag tenantguard-api:ci .
