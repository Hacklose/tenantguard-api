name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "ci/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      PORT: 3001
      LAB_MODE: "false"
      DATABASE_URL: postgresql://tenantguard:tenantguard_ci_password@127.0.0.1:5432/tenantguard_test?schema=public

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: tenantguard
          POSTGRES_PASSWORD: tenantguard_ci_password
          POSTGRES_DB: tenantguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenantguard -d tenantguard_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply test migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker full-stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POSTGRES_USER: tenantguard
      POSTGRES_PASSWORD: tenantguard_ci_password
      POSTGRES_DB: tenantguard
      POSTGRES_TEST_DB: tenantguard_test
      DEMO_ACCOUNT_PASSWORD: tenantguard_demo_password
      POSTGRES_PORT: 5432
      API_PORT: 3000
      WEB_PORT: 8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Compose configurations
        run: |
          docker compose config -q

          docker compose \
            -f compose.yaml \
            -f compose.lab.yaml \
            config -q

      - name: Start secure full stack
        run: docker compose up --build -d

      - name: Verify secure mode
        run: |
          test "$(
            docker compose exec -T api printenv LAB_MODE
          )" = "false"

      - name: Run secure Docker smoke test
        run: ./scripts/docker-smoke-test.sh

      - name: Stop secure full stack
        run: docker compose down -v --remove-orphans

      - name: Start vulnerable lab full stack
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.lab.yaml \
            up --build -d

      - name: Verify vulnerable lab mode
        run: |
          test "$(
            docker compose \
              -f compose.yaml \
              -f compose.lab.yaml \
              exec -T api printenv LAB_MODE
          )" = "true"

      - name: Run lab Docker smoke test
        run: ./scripts/docker-smoke-test.sh

      - name: Show Compose state and logs on failure
        if: failure()
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.lab.yaml \
            ps -a

          docker compose \
            -f compose.yaml \
            -f compose.lab.yaml \
            logs --no-color

      - name: Clean up Docker resources
        if: always()
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.lab.yaml \
            down -v --remove-orphans
